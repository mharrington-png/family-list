<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Family"/>
  <meta name="theme-color" content="#4a7a40"/>
  <title>Family</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@400;500;600;700&family=Fraunces:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;}
    body{
      background:var(--bg);
      color:var(--ink);
      font-family:var(--font-body);
      overscroll-behavior:none;
      transition:background 0.3s ease,color 0.3s ease;
      -webkit-font-smoothing:antialiased;
    }
    ::-webkit-scrollbar{width:6px;height:6px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:6px;}
    button{font-family:inherit;}
    button:active{transform:scale(0.97);}
    input,textarea,select{font-family:inherit;color:var(--ink);}
    input::placeholder,textarea::placeholder{color:var(--muted);}
    input:focus,textarea:focus{outline:none;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
    @keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes popIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
    /* fillMode forwards so re-renders that retrigger the animation don't strand cards at opacity:0 */
    [data-anim="fadeIn"]{animation:fadeIn 0.2s ease forwards;}
    [data-anim="popIn"]{animation:popIn 0.25s cubic-bezier(0.34,1.56,0.64,1) forwards;}
    [data-anim="slideUp"]{animation:slideUp 0.28s cubic-bezier(0.34,1.56,0.64,1) forwards;}
    .serif{font-family:var(--font-display);}
    .ital{font-style:italic;}
    .mono{font-family:'JetBrains Mono',monospace;}
    /* Hide horizontal scrollbar on kanban for cleaner look */
    .kanban-scroll{scrollbar-width:thin;}
    .kanban-scroll::-webkit-scrollbar{height:8px;}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script type="text/babel">
const THEMES = {

    dark:{bg:"linear-gradient(170deg,#1a201a 0%,#1f2620 60%,#202b22 100%)", card:"rgba(38,46,38,0.7)", ink:"#e8eee0", ink2:"#a8b898", muted:"#6a7a62", line:"rgba(180,210,160,0.10)", line2:"rgba(180,210,160,0.20)", chip:"rgba(120,160,100,0.18)", scroll:"#2a3a26", glow:"rgba(120,180,100,0.18)"},
  },
  warm: {
    name:"Warm", accent:"#b86b3a", accent2:"#d49060",
    light:{bg:"linear-gradient(170deg,#f7f1e8 0%,#f3e8d8 60%,#ecdcc4 100%)", card:"rgba(255,250,242,0.88)", ink:"#3a2a1e", ink2:"#6a5340", muted:"#c0a888", line:"rgba(160,110,60,0.18)", line2:"rgba(160,110,60,0.30)", chip:"rgba(184,107,58,0.10)", scroll:"#d8b890", glow:"rgba(184,107,58,0.12)"},
    dark:{bg:"linear-gradient(170deg,#1d1714 0%,#241c17 60%,#28201a 100%)", card:"rgba(46,36,28,0.72)", ink:"#f0e2d0", ink2:"#c0a888", muted:"#7a6850", line:"rgba(220,180,140,0.10)", line2:"rgba(220,180,140,0.22)", chip:"rgba(184,107,58,0.20)", scroll:"#3a2a20", glow:"rgba(220,150,90,0.18)"},
  },
  blue: {
    name:"Blue", accent:"#3a6ea8", accent2:"#5a8ec8",
    light:{bg:"linear-gradient(170deg,#eef2f6 0%,#e4ecf2 60%,#d6e2ec 100%)", card:"rgba(255,255,255,0.88)", ink:"#1f2d3d", ink2:"#48607a", muted:"#a4b4c4", line:"rgba(80,120,170,0.18)", line2:"rgba(80,120,170,0.30)", chip:"rgba(58,110,168,0.10)", scroll:"#b8c8d8", glow:"rgba(58,110,168,0.14)"},
    dark:{bg:"linear-gradient(170deg,#161a20 0%,#1a2028 60%,#1d2632 100%)", card:"rgba(34,42,52,0.72)", ink:"#dfe8f0", ink2:"#a4b4c4", muted:"#5a6e80", line:"rgba(160,200,240,0.10)", line2:"rgba(160,200,240,0.22)", chip:"rgba(90,142,200,0.20)", scroll:"#2a3340", glow:"rgba(90,142,200,0.20)"},
  },
  mono: {
    name:"Mono", accent:"#2d3a28", accent2:"#4a5640",
    light:{bg:"linear-gradient(170deg,#f4f3f0 0%,#ecebe6 60%,#e0dfd8 100%)", card:"rgba(255,255,255,0.92)", ink:"#1a1a18", ink2:"#4a4a44", muted:"#a8a8a0", line:"rgba(40,40,38,0.10)", line2:"rgba(40,40,38,0.22)", chip:"rgba(40,40,38,0.06)", scroll:"#cccac4", glow:"rgba(40,40,38,0.08)"},
    dark:{bg:"linear-gradient(170deg,#0f0f0e 0%,#15151a 60%,#1a1a18 100%)", card:"rgba(30,30,28,0.85)", ink:"#ecebe4", ink2:"#a8a8a0", muted:"#5e5e58", line:"rgba(220,220,210,0.10)", line2:"rgba(220,220,210,0.20)", chip:"rgba(220,220,210,0.06)", scroll:"#2a2a26", glow:"rgba(220,220,210,0.10)"},
  },
};
const FONT_PAIRS = {
  editorial: {display:"'Fraunces',serif", body:"'DM Sans',system-ui,sans-serif", name:"Editorial"},
  classic:   {display:"'Lora',Georgia,serif", body:"'DM Sans',system-ui,sans-serif", name:"Classic"},
  modern:    {display:"'Geist','Inter',sans-serif", body:"'Geist','Inter',system-ui,sans-serif", name:"Modern"},
  refined:   {display:"'Instrument Serif',serif", body:"'Inter',system-ui,sans-serif", name:"Refined"},
};
window.THEMES = THEMES;
window.FONT_PAIRS = FONT_PAIRS;

function applyTheme(theme, fontPair, dark){
  const t = THEMES[theme] || THEMES.sage;
  const c = dark ? t.dark : t.light;
  const f = FONT_PAIRS[fontPair] || FONT_PAIRS.editorial;
  const r = document.documentElement.style;
  r.setProperty("--bg", c.bg);
  r.setProperty("--card", c.card);
  r.setProperty("--ink", c.ink);
  r.setProperty("--ink2", c.ink2);
  r.setProperty("--muted", c.muted);
  r.setProperty("--line", c.line);
  r.setProperty("--line2", c.line2);
  r.setProperty("--chip", c.chip);
  r.setProperty("--scroll", c.scroll);
  r.setProperty("--glow", c.glow);
  r.setProperty("--accent", t.accent);
  r.setProperty("--accent2", t.accent2);
  r.setProperty("--font-display", f.display);
  r.setProperty("--font-body", f.body);
  // theme-color for mobile chrome
  const meta = document.querySelector('meta[name="theme-color"]');
  if(meta) meta.setAttribute("content", t.accent);
}
window.applyTheme = applyTheme;
applyTheme(window.TWEAK_DEFAULTS.theme, window.TWEAK_DEFAULTS.fontPair, window.TWEAK_DEFAULTS.dark);
</script>

<!-- ─────────── Helpers ─────────── -->
<script type="text/babel">
const CFG_KEY   = "fa-config";
const CACHE_KEY = "fa-cache-v3";
const TWK_KEY   = "fa-tweaks";

const loadConfig = () => { try{return JSON.parse(localStorage.getItem(CFG_KEY))||{};}catch{return{};} };
const saveConfig = c => localStorage.setItem(CFG_KEY,JSON.stringify(c));
const loadCache  = () => { try{return JSON.parse(localStorage.getItem(CACHE_KEY));}catch{return null;} };
const saveCache  = d => { try{localStorage.setItem(CACHE_KEY,JSON.stringify(d));}catch{} };

async function api(scriptUrl, password, action, extra={}){
  const res = await fetch(scriptUrl,{
    method:"POST", headers:{"Content-Type":"text/plain"},
    body: JSON.stringify({password,action,...extra}), redirect:"follow",
  });
  const json = await res.json();
  if(json.error) throw new Error(json.error);
  return json;
}

const STORE_HUES = [128, 30, 210, 320, 180, 80, 0, 260, 50, 160];
const STORE_COLORS = STORE_HUES.map(h => `oklch(58% 0.13 ${h})`);
const COMMON_STORES = ["Market Basket","Costco","Whole Foods","Trader Joe's","Target","Walmart","Stop & Shop","Shaw's","BJ's Wholesale","Aldi","CVS","Walgreens","Home Depot","Lowe's","Petco","Hannaford","Star Market","Wegmans"];

function storeIcon(n=""){
  n=n.toLowerCase();
  if(n.includes("costco")||n.includes("bj"))return"🏪";
  if(n.includes("whole"))return"🌿";
  if(n.includes("trader"))return"🌺";
  if(n.includes("target"))return"◎";
  if(n.includes("walmart"))return"★";
  if(n.includes("cvs")||n.includes("walgreens"))return"⊕";
  if(n.includes("home depot")||n.includes("lowe"))return"⚒";
  if(n.includes("petco")||n.includes("pet"))return"🐾";
  if(n.includes("market")||n.includes("basket"))return"🧺";
  if(n.includes("aldi"))return"◇";
  return n.slice(0,1).toUpperCase();
}
const EMOJI_MAP = {milk:"🥛",eggs:"🥚",bread:"🍞",butter:"🧈",cheese:"🧀",chicken:"🍗",beef:"🥩",fish:"🐟",pasta:"🍝",rice:"🍚",apple:"🍎",banana:"🍌",orange:"🍊",tomato:"🍅",onion:"🧅",garlic:"🧄",potato:"🥔",carrot:"🥕",broccoli:"🥦",avocado:"🥑",coffee:"☕",tea:"🍵",juice:"🧃",wine:"🍷",beer:"🍺",yogurt:"🥛",sugar:"🍬",flour:"🌾",oil:"🫒",salt:"🧂",soap:"🧼",shampoo:"🧴",paper:"🧻",dog:"🐾",cat:"🐾",treat:"🦴",cereal:"🥣",chocolate:"🍫"};
function itemEmoji(n=""){const l=n.toLowerCase();for(const[k,v]of Object.entries(EMOJI_MAP))if(l.includes(k))return v;return"·";}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function fmt(d){if(!d)return"";const x=new Date(d+"T12:00:00");return x.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}
function fmtShort(d){if(!d)return"";const x=new Date(d+"T12:00:00");return x.toLocaleDateString("en-US",{month:"short",day:"numeric"});}
function isUpcoming(d){if(!d)return true;return new Date(d+"T23:59:59")>=new Date();}
function daysUntil(d){if(!d)return null;const ms=new Date(d+"T12:00:00")-new Date();return Math.ceil(ms/(1000*60*60*24));}
function relDay(n){if(n===null)return"";if(n<0)return`${-n}d ago`;if(n===0)return"today";if(n===1)return"tomorrow";if(n<7)return`in ${n}d`;if(n<30)return`in ${Math.round(n/7)}w`;return`in ${Math.round(n/30)}mo`;}

window.api=api;window.uid=uid;window.fmt=fmt;window.fmtShort=fmtShort;window.isUpcoming=isUpcoming;window.daysUntil=daysUntil;window.relDay=relDay;
window.storeIcon=storeIcon;window.itemEmoji=itemEmoji;window.STORE_COLORS=STORE_COLORS;window.COMMON_STORES=COMMON_STORES;
window.loadConfig=loadConfig;window.saveConfig=saveConfig;window.loadCache=loadCache;window.saveCache=saveCache;
window.CFG_KEY=CFG_KEY;window.TWK_KEY=TWK_KEY;
</script>

<!-- ─────────── All app code (merged) ─────────── -->
<script type="text/babel">
// ── Hook aliases (all variants used across files) ──
const { useState, useEffect, useRef, useCallback, useMemo } = React;
// views.jsx aliases
const uS=useState, uE=useEffect, uR=useRef, uCB=useCallback, uM=useMemo;
// app.jsx aliases
const US=useState, UE=useEffect, UR=useRef, UCB=useCallback, UM=useMemo;

// ════════════════ components.jsx ════════════════
// ─────────── Reusable UI components ───────────

// Setup screen
function SetupScreen({onComplete}){
  const [url,setUrl]=useState(""); const [pass,setPass]=useState("");
  const [calId,setCalId]=useState(""); const [error,setError]=useState("");
  const [testing,setTesting]=useState(false);
  const handleSubmit=async()=>{
    if(!url.trim()||!pass.trim()){setError("Script URL and password required.");return;}
    setTesting(true);setError("");
    try{
      await api(url.trim(),pass.trim(),"getAll");
      const cfg={scriptUrl:url.trim(),password:pass.trim(),calendarId:calId.trim()};
      saveConfig(cfg); onComplete(cfg);
    }catch(e){setError(e.message==="Invalid password"?"Wrong password.":"Couldn't connect. Check the URL.");}
    finally{setTesting(false);}
  };
  const field={width:"100%",padding:"12px 14px",borderRadius:12,border:"1.5px solid var(--line2)",background:"var(--card)",fontSize:14,color:"var(--ink)",outline:"none",marginBottom:14};
  const label={fontSize:11,fontWeight:700,color:"var(--accent)",letterSpacing:0.6,textTransform:"uppercase",display:"block",marginBottom:6};
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{width:"100%",maxWidth:440,background:"var(--card)",backdropFilter:"blur(14px)",borderRadius:24,padding:36,boxShadow:"0 12px 50px var(--glow)",border:"1px solid var(--line)"}}>
        <p className="serif ital" style={{fontSize:14,color:"var(--accent)",marginBottom:6}}>welcome to your</p>
        <h1 className="serif" style={{fontSize:38,fontWeight:500,color:"var(--ink)",marginBottom:8,lineHeight:1.05,letterSpacing:-0.5}}>Family.</h1>
        <p style={{fontSize:14,color:"var(--ink2)",marginBottom:28,lineHeight:1.55}}>Paste your Apps Script URL and shared password. Calendar ID enables event creation.</p>
        <label style={label}>Apps Script URL</label>
        <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://script.google.com/macros/s/…/exec" style={field}/>
        <label style={label}>Password</label>
        <input value={pass} onChange={e=>setPass(e.target.value)} type="password" placeholder="Shared password" style={{...field,marginBottom:error?8:14}} onKeyDown={e=>e.key==="Enter"&&handleSubmit()}/>
        {error&&<p style={{fontSize:13,color:"#c05050",marginBottom:14}}>{error}</p>}
        <label style={label}>Calendar ID <span style={{fontWeight:400,color:"var(--muted)",textTransform:"none",letterSpacing:0}}>(optional)</span></label>
        <input value={calId} onChange={e=>setCalId(e.target.value)} placeholder="yourname@gmail.com" style={field}/>
        <button onClick={handleSubmit} disabled={testing} style={{width:"100%",padding:"14px",background:testing?"var(--muted)":"var(--accent)",color:"white",border:"none",borderRadius:14,fontSize:15,fontWeight:700,cursor:testing?"not-allowed":"pointer",marginTop:8,letterSpacing:0.2}}>
          {testing?"Connecting…":"Connect →"}
        </button>
      </div>
    </div>
  );
}

// History modal
function HistoryModal({history,onRemove,onClearAll,onClose}){
  const [filter,setFilter]=useState(""); const ref=useRef(null);
  useEffect(()=>{ref.current?.focus();},[]);
  const visible=filter.trim()?history.filter(h=>h.toLowerCase().includes(filter.toLowerCase())):history;
  return (
    <div style={{position:"fixed",inset:0,zIndex:5000,background:"rgba(20,30,15,0.5)",backdropFilter:"blur(6px)",display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:500,background:"var(--card)",backdropFilter:"blur(20px)",borderRadius:"24px 24px 0 0",border:"1px solid var(--line)",borderBottom:"none",maxHeight:"85vh",display:"flex",flexDirection:"column",animation:"slideUp 0.28s cubic-bezier(0.34,1.56,0.64,1)"}}>
        <div style={{padding:"22px 22px 14px",borderBottom:"1px solid var(--line)"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
            <div>
              <p className="serif ital" style={{fontSize:13,color:"var(--accent)",marginBottom:1}}>manage</p>
              <h2 className="serif" style={{fontSize:24,fontWeight:500,color:"var(--ink)",lineHeight:1}}>History</h2>
            </div>
            <button onClick={onClose} style={{width:34,height:34,borderRadius:"50%",border:"none",background:"var(--chip)",cursor:"pointer",fontSize:16,color:"var(--ink2)"}}>✕</button>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,background:"var(--card)",borderRadius:12,padding:"9px 14px",border:"1px solid var(--line2)"}}>
            <input ref={ref} value={filter} onChange={e=>setFilter(e.target.value)} placeholder="Search history…" style={{flex:1,border:"none",outline:"none",background:"transparent",fontSize:14}}/>
            {filter&&<button onClick={()=>setFilter("")} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:"var(--muted)"}}>✕</button>}
          </div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:10}}>
            <p className="mono" style={{fontSize:11,color:"var(--muted)"}}>{visible.length} / {history.length}</p>
            {history.length>0&&<button onClick={()=>{if(confirm("Clear entire history?"))onClearAll();}} style={{background:"none",border:"1px solid rgba(200,100,100,0.4)",color:"#c08080",borderRadius:8,padding:"4px 12px",fontSize:11,cursor:"pointer",fontWeight:600}}>Clear all</button>}
          </div>
        </div>
        <div style={{overflowY:"auto",flex:1,padding:"10px 22px 24px"}}>
          {visible.length===0 ? (
            <div style={{textAlign:"center",padding:"40px 20px",color:"var(--muted)"}}>
              <p className="serif ital" style={{fontSize:17}}>{filter?"No matches":"History is empty"}</p>
            </div>
          ) : visible.map((entry,i)=>(
            <div key={entry+i} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:10,marginBottom:4,background:"var(--card)",border:"1px solid var(--line)"}}>
              <span style={{fontSize:14,flexShrink:0,color:"var(--muted)",width:14,textAlign:"center"}}>{itemEmoji(entry)}</span>
              <span style={{flex:1,fontSize:14.5,color:"var(--ink)"}}>{entry}</span>
              <button onClick={()=>onRemove(entry)} style={{width:26,height:26,borderRadius:"50%",border:"none",background:"rgba(200,80,80,0.10)",color:"#c06060",cursor:"pointer",fontSize:13,fontWeight:700}}>✕</button>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─────────── Tweaks Panel ───────────
function TweaksPanel({tweaks,setTweak,onClose}){
  const Section = ({title,children})=>(
    <div style={{marginBottom:18}}>
      <p className="mono" style={{fontSize:10,fontWeight:600,color:"var(--muted)",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>{title}</p>
      {children}
    </div>
  );
  const Row = ({children})=> <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{children}</div>;
  const Chip = ({active,onClick,children,swatch})=>(
    <button onClick={onClick} style={{
      flex:"1 1 auto",padding:"8px 10px",borderRadius:10,
      border:active?"1.5px solid var(--accent)":"1px solid var(--line2)",
      background:active?"var(--chip)":"transparent",color:"var(--ink)",
      fontSize:12,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:6,justifyContent:"center"
    }}>
      {swatch && <span style={{width:10,height:10,borderRadius:"50%",background:swatch,display:"inline-block"}}/>}
      {children}
    </button>
  );
  return (
    <div style={{position:"fixed",bottom:16,right:16,zIndex:6000,width:300,maxWidth:"calc(100vw - 32px)",background:"var(--card)",backdropFilter:"blur(20px)",border:"1px solid var(--line2)",borderRadius:16,padding:18,boxShadow:"0 20px 60px var(--glow)",animation:"fadeIn 0.2s ease"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <p className="serif" style={{fontSize:18,fontWeight:500,color:"var(--ink)"}}>Tweaks</p>
        <button onClick={onClose} style={{width:26,height:26,borderRadius:"50%",border:"none",background:"var(--chip)",cursor:"pointer",fontSize:13,color:"var(--ink2)"}}>✕</button>
      </div>
      <Section title="Theme">
        <Row>
          {Object.keys(THEMES).map(k=>(
            <Chip key={k} active={tweaks.theme===k} onClick={()=>setTweak("theme",k)} swatch={THEMES[k].accent}>{THEMES[k].name}</Chip>
          ))}
        </Row>
      </Section>
      <Section title="Mode">
        <Row>
          <Chip active={!tweaks.dark} onClick={()=>setTweak("dark",false)}>☀ Light</Chip>
          <Chip active={tweaks.dark} onClick={()=>setTweak("dark",true)}>☾ Dark</Chip>
        </Row>
      </Section>
      <Section title="Typography">
        <Row>
          {Object.keys(FONT_PAIRS).map(k=>(
            <Chip key={k} active={tweaks.fontPair===k} onClick={()=>setTweak("fontPair",k)}>
              <span style={{fontFamily:FONT_PAIRS[k].display}}>Aa</span>
              <span style={{fontSize:11,color:"var(--ink2)"}}>{FONT_PAIRS[k].name}</span>
            </Chip>
          ))}
        </Row>
      </Section>
      <Section title="Layout (desktop)">
        <Row>
          <Chip active={tweaks.layout==="auto"} onClick={()=>setTweak("layout","auto")}>Auto</Chip>
          <Chip active={tweaks.layout==="sidebar"} onClick={()=>setTweak("layout","sidebar")}>Sidebar</Chip>
          <Chip active={tweaks.layout==="tabs"} onClick={()=>setTweak("layout","tabs")}>Tabs</Chip>
        </Row>
      </Section>
      <Section title="Activities view">
        <Row>
          <Chip active={tweaks.activitiesView==="cards"} onClick={()=>setTweak("activitiesView","cards")}>Cards</Chip>
          <Chip active={tweaks.activitiesView==="timeline"} onClick={()=>setTweak("activitiesView","timeline")}>Timeline</Chip>
          <Chip active={tweaks.activitiesView==="calendar"} onClick={()=>setTweak("activitiesView","calendar")}>Calendar</Chip>
        </Row>
      </Section>
    </div>
  );
}

// ━━━━━━━━━━━━ Add Activity Modal ━━━━━━━━━━━━
function AddActivityModal({onSave,onClose,initial}){
  const [name,setName]=uS(initial?.name||"");
  const [startDate,setStartDate]=uS(initial?.startDate||"");
  const [endDate,setEndDate]=uS(initial?.endDate||"");
  const [startTime,setStartTime]=uS(initial?.startTime||"");
  const [endTime,setEndTime]=uS(initial?.endTime||"");
  const [location,setLocation]=uS(initial?.location||"");
  const [notes,setNotes]=uS(initial?.notes||"");
  const [saving,setSaving]=uS(false);

  const inputStyle={width:"100%",padding:"11px 14px",borderRadius:11,border:"1.5px solid var(--line2)",background:"var(--card)",fontSize:14,color:"var(--ink)",outline:"none"};
  const labelStyle={fontSize:10,fontWeight:700,color:"var(--accent)",letterSpacing:0.6,textTransform:"uppercase",display:"block",marginBottom:5,marginTop:14};

  const handleSave=()=>{
    if(!name.trim()||!startDate){alert("Name and start date are required.");return;}
    setSaving(true);
    onSave({id:initial?.id||uid(),name:name.trim(),startDate,endDate:endDate||startDate,startTime,endTime,location:location.trim(),notes:notes.trim(),addedAt:initial?.addedAt||Date.now()});
  };

  return (
    <div style={{position:"fixed",inset:0,zIndex:5000,background:"rgba(20,30,15,0.5)",backdropFilter:"blur(6px)",display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:540,background:"var(--card)",backdropFilter:"blur(20px)",borderRadius:"24px 24px 0 0",border:"1px solid var(--line)",borderBottom:"none",maxHeight:"94vh",overflowY:"auto",animation:"slideUp 0.28s cubic-bezier(0.34,1.56,0.64,1)"}}>
        <div style={{padding:"26px 26px 36px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
            <div>
              <p className="serif ital" style={{fontSize:13,color:"var(--accent)",marginBottom:1}}>{initial?"edit":"new"}</p>
              <h2 className="serif" style={{fontSize:26,fontWeight:500,color:"var(--ink)",lineHeight:1}}>Activity</h2>
            </div>
            <button onClick={onClose} style={{width:34,height:34,borderRadius:"50%",border:"none",background:"var(--chip)",cursor:"pointer",fontSize:16,color:"var(--ink2)"}}>✕</button>
          </div>

          <label style={labelStyle}>Name</label>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Summer camp, soccer practice…" style={inputStyle} autoFocus/>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><label style={labelStyle}>Start date</label><input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)} style={inputStyle}/></div>
            <div><label style={labelStyle}>End date</label><input type="date" value={endDate} onChange={e=>setEndDate(e.target.value)} style={inputStyle}/></div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><label style={labelStyle}>Start time</label><input type="time" value={startTime} onChange={e=>setStartTime(e.target.value)} style={inputStyle}/></div>
            <div><label style={labelStyle}>End time</label><input type="time" value={endTime} onChange={e=>setEndTime(e.target.value)} style={inputStyle}/></div>
          </div>

          <label style={labelStyle}>Location</label>
          <input value={location} onChange={e=>setLocation(e.target.value)} placeholder="Address or venue" style={inputStyle}/>

          <label style={labelStyle}>Notes</label>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Any details…" rows={3} style={{...inputStyle,resize:"vertical",lineHeight:1.5}}/>

          <p style={{fontSize:11,color:"var(--muted)",marginTop:14,marginBottom:18,lineHeight:1.5}}>
            Reminders set automatically at 14d, 7d, and 1d before start.
          </p>

          <button onClick={handleSave} disabled={saving||!name.trim()||!startDate}
            style={{width:"100%",padding:"14px",background:saving||!name.trim()||!startDate?"var(--muted)":"var(--accent)",color:"white",border:"none",borderRadius:13,fontSize:15,fontWeight:700,cursor:"pointer",letterSpacing:0.2}}>
            {saving?"Saving…":"Save"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ━━━━━━━━━━━━ Paperwork ━━━━━━━━━━━━
function PaperworkRow({item,onToggle,onDelete,compact}){
  return (
    <div style={{display:"flex",alignItems:"center",gap:10,padding:compact?"7px 10px":"9px 12px",borderRadius:10,marginBottom:5,background:"var(--card)",border:"1px solid var(--line)"}}>
      <button onClick={()=>onToggle(item.id,!item.completed)}
        style={{width:20,height:20,borderRadius:6,border:`1.8px solid ${item.completed?"var(--accent)":"var(--line2)"}`,background:item.completed?"var(--accent)":"transparent",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
        {item.completed&&<span style={{color:"white",fontSize:11,fontWeight:700,lineHeight:1}}>✓</span>}
      </button>
      <span style={{flex:1,fontSize:13.5,color:item.completed?"var(--muted)":"var(--ink)",textDecoration:item.completed?"line-through":"none"}}>{item.label}</span>
      {item.url&&(
        <a href={item.url} target="_blank" rel="noopener noreferrer" style={{fontSize:14,textDecoration:"none",flexShrink:0,color:"var(--ink2)"}} title={item.type==="pdf"?"PDF":"Link"}>
          {item.type==="pdf"?"📄":"↗"}
        </a>
      )}
      {onDelete&&<button onClick={()=>onDelete(item.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"var(--muted)",flexShrink:0}}>✕</button>}
    </div>
  );
}

function AddPaperworkForm({activityId,onAdd,onUpload,uploading}){
  const [label,setLabel]=uS(""); const [type,setType]=uS("link");
  const [url,setUrl]=uS(""); const fileRef=uR(null);
  const handleAdd=()=>{
    if(!label.trim())return;
    if(type!=="upload"&&!url.trim()){alert("URL needed.");return;}
    onAdd({id:uid(),activityId,label:label.trim(),type,url:url.trim(),addedAt:Date.now()});
    setLabel("");setUrl("");setType("link");
  };
  const handleFile=async(e)=>{
    const file=e.target.files[0];
    if(!file||!label.trim()){if(!label.trim())alert("Enter a label first.");return;}
    const fileUrl=await onUpload(file,label.trim(),activityId);
    if(fileUrl){onAdd({id:uid(),activityId,label:label.trim(),type:"pdf",url:fileUrl,addedAt:Date.now()});setLabel("");setType("link");}
    e.target.value="";
  };
  const btn=(active)=>({padding:"5px 11px",borderRadius:18,border:"none",cursor:"pointer",fontSize:11.5,fontWeight:600,background:active?"var(--accent)":"var(--chip)",color:active?"white":"var(--ink2)"});
  return (
    <div style={{marginTop:10,padding:14,background:"var(--chip)",borderRadius:12,border:"1px solid var(--line)"}}>
      <p className="mono" style={{fontSize:10,fontWeight:600,color:"var(--accent)",letterSpacing:0.6,marginBottom:8,textTransform:"uppercase"}}>Add paperwork</p>
      <input value={label} onChange={e=>setLabel(e.target.value)} placeholder="Label (Health Form, Deposit…)"
        onKeyDown={e=>e.key==="Enter"&&type!=="upload"&&handleAdd()}
        style={{width:"100%",padding:"9px 12px",borderRadius:10,border:"1px solid var(--line2)",background:"var(--card)",fontSize:13.5,outline:"none",marginBottom:8}}/>
      <div style={{display:"flex",gap:6,marginBottom:8}}>
        <button style={btn(type==="link")} onClick={()=>setType("link")}>Web link</button>
        <button style={btn(type==="pdf")} onClick={()=>setType("pdf")}>PDF link</button>
        <button style={btn(type==="upload")} onClick={()=>setType("upload")}>Upload PDF</button>
      </div>
      {type==="upload" ? (
        <div style={{display:"flex",gap:8}}>
          <input ref={fileRef} type="file" accept=".pdf,application/pdf" onChange={handleFile} style={{display:"none"}}/>
          <button onClick={()=>fileRef.current?.click()} disabled={uploading||!label.trim()}
            style={{flex:1,padding:"9px",background:uploading||!label.trim()?"var(--muted)":"var(--accent)",color:"white",border:"none",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer"}}>
            {uploading?"Uploading…":"Choose PDF"}
          </button>
        </div>
      ) : (
        <div style={{display:"flex",gap:8}}>
          <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://…"
            onKeyDown={e=>e.key==="Enter"&&handleAdd()}
            style={{flex:1,padding:"9px 12px",borderRadius:10,border:"1px solid var(--line2)",background:"var(--card)",fontSize:13,outline:"none"}}/>
          <button onClick={handleAdd} disabled={!label.trim()||!url.trim()}
            style={{padding:"9px 14px",background:!label.trim()||!url.trim()?"var(--muted)":"var(--accent)",color:"white",border:"none",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer"}}>Add</button>
        </div>
      )}
    </div>
  );
}

// ━━━━━━━━━━━━ Activity Card ━━━━━━━━━━━━
function ActivityCard({activity,paperwork,onDelete,onTogglePaperwork,onDeletePaperwork,onAddPaperwork,onUpload,uploading,defaultExpanded}){
  const [expanded,setExpanded]=uS(!!defaultExpanded);
  const [showAddPW,setShowAddPW]=uS(false);
  const pw=paperwork.filter(p=>String(p.activityId)===String(activity.id));
  const completed=pw.filter(p=>p.completed===true||p.completed==="TRUE"||p.completed==="true").length;
  const upcoming=isUpcoming(activity.endDate||activity.startDate);
  const days=daysUntil(activity.startDate);
  const pct = pw.length>0 ? completed/pw.length : null;

  const dateStr=()=>{
    const s=fmt(activity.startDate);
    const e=activity.endDate&&activity.endDate!==activity.startDate?fmt(activity.endDate):"";
    const t=activity.startTime?` · ${activity.startTime}`:"";
    return e?`${s} – ${e}${t}`:`${s}${t}`;
  };

  return (
    <div style={{background:"var(--card)",backdropFilter:"blur(8px)",borderRadius:16,marginBottom:12,border:"1px solid var(--line)",opacity:upcoming?1:0.62,overflow:"hidden"}}>
      <div style={{padding:"16px 18px",cursor:"pointer",display:"flex",gap:12,alignItems:"flex-start"}} onClick={()=>setExpanded(p=>!p)}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"baseline",gap:10,flexWrap:"wrap",marginBottom:4}}>
            <span className="serif" style={{fontSize:18,fontWeight:500,color:"var(--ink)",letterSpacing:-0.2}}>{activity.name}</span>
            {upcoming && days!==null && days>=0 && days<14 && (
              <span className="mono" style={{fontSize:10,color:"var(--accent)",fontWeight:600,letterSpacing:0.4,textTransform:"uppercase"}}>{relDay(days)}</span>
            )}
            {!upcoming && <span className="mono" style={{fontSize:9,background:"var(--chip)",color:"var(--muted)",borderRadius:8,padding:"2px 7px",fontWeight:600,letterSpacing:0.5}}>PAST</span>}
          </div>
          {activity.startDate && <p style={{fontSize:13,color:"var(--ink2)",marginBottom:2}}>{dateStr()}</p>}
          {activity.location && <p style={{fontSize:12.5,color:"var(--muted)"}}>· {activity.location}</p>}
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6,flexShrink:0}}>
          {pw.length>0 && (
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:36,height:4,background:"var(--line)",borderRadius:2,overflow:"hidden"}}>
                <div style={{width:`${pct*100}%`,height:"100%",background:pct===1?"var(--accent)":"var(--accent2)"}}/>
              </div>
              <span className="mono" style={{fontSize:11,fontWeight:600,color:pct===1?"var(--accent)":"var(--ink2)",whiteSpace:"nowrap"}}>{completed}/{pw.length}</span>
            </div>
          )}
          <span style={{fontSize:10,color:"var(--muted)"}}>{expanded?"▲":"▼"}</span>
        </div>
      </div>

      {expanded && (
        <div style={{padding:"0 18px 18px",borderTop:"1px solid var(--line)"}}>
          {activity.notes && <p style={{fontSize:13.5,color:"var(--ink2)",padding:"12px 0",lineHeight:1.55,fontStyle:"italic",fontFamily:"var(--font-display)"}}>"{activity.notes}"</p>}

          {pw.length>0 && (
            <div style={{marginTop:12}}>
              <p className="mono" style={{fontSize:10,fontWeight:600,color:"var(--accent)",letterSpacing:0.6,marginBottom:8,textTransform:"uppercase"}}>Paperwork</p>
              {pw.map(p=><PaperworkRow key={p.id} item={{...p,completed:p.completed===true||p.completed==="TRUE"||p.completed==="true"}} onToggle={onTogglePaperwork} onDelete={onDeletePaperwork}/>)}
            </div>
          )}

          {showAddPW ? (
            <AddPaperworkForm activityId={activity.id} uploading={uploading} onUpload={onUpload}
              onAdd={(pwItem)=>{onAddPaperwork(pwItem);setShowAddPW(false);}}/>
          ) : (
            <button onClick={()=>setShowAddPW(true)}
              style={{marginTop:12,width:"100%",padding:"9px",borderRadius:11,border:"1.5px dashed var(--line2)",background:"transparent",cursor:"pointer",fontSize:13,color:"var(--ink2)",fontWeight:600}}>
              + Add paperwork
            </button>
          )}

          <button onClick={()=>{if(confirm("Delete this activity and all its paperwork?"))onDelete(activity.id);}}
            style={{marginTop:10,background:"none",border:"none",cursor:"pointer",fontSize:11.5,color:"#c08080",display:"block",marginLeft:"auto"}}>
            Delete activity
          </button>
        </div>
      )}
    </div>
  );
}


// ━━━━━━━━━━━━ Activities Tab ━━━━━━━━━━━━
function ActivitiesTab({activities,paperwork,view,onAdd,onDelete,onTogglePaperwork,onDeletePaperwork,onAddPaperwork,onUpload,uploading}){
  const [showAdd,setShowAdd]=uS(false);
  const [showPast,setShowPast]=uS(false);
  const sorted=[...activities].sort((a,b)=>new Date(a.startDate)-new Date(b.startDate));
  const upcoming=sorted.filter(a=>isUpcoming(a.endDate||a.startDate));
  const past=sorted.filter(a=>!isUpcoming(a.endDate||a.startDate)).reverse();

  // Group upcoming by month for timeline
  const byMonth = uM(()=>{
    const m={};
    upcoming.forEach(a=>{
      if(!a.startDate)return;
      const d=new Date(a.startDate+"T12:00:00");
      const k=d.toLocaleDateString("en-US",{month:"long",year:"numeric"});
      (m[k]=m[k]||[]).push(a);
    });
    return m;
  },[upcoming]);

  // Calendar grid for current month
  const cal = uM(()=>{
    const today=new Date(); today.setHours(0,0,0,0);
    const first=new Date(today.getFullYear(),today.getMonth(),1);
    const startDay=first.getDay();
    const daysInMonth=new Date(today.getFullYear(),today.getMonth()+1,0).getDate();
    const cells=[];
    for(let i=0;i<startDay;i++)cells.push(null);
    for(let d=1;d<=daysInMonth;d++){
      const date=new Date(today.getFullYear(),today.getMonth(),d);
      const iso=`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      const acts=upcoming.filter(a=>{
        if(!a.startDate)return false;
        return iso>=a.startDate && iso<=(a.endDate||a.startDate);
      });
      cells.push({date,iso,acts,isToday:date.getTime()===today.getTime()});
    }
    return {cells, monthLabel:today.toLocaleDateString("en-US",{month:"long",year:"numeric"})};
  },[upcoming]);

  const AddBtn = (
    <button onClick={()=>setShowAdd(true)}
      style={{width:"100%",padding:"14px",borderRadius:14,border:"1.5px dashed var(--line2)",background:"transparent",cursor:"pointer",fontSize:14,color:"var(--ink2)",fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:18}}>
      <span style={{fontSize:18}}>+</span> Add activity
    </button>
  );

  return (
    <div style={{padding:"0 0 60px"}}>
      {AddBtn}

      {upcoming.length===0 && past.length===0 && (
        <div style={{textAlign:"center",padding:"60px 20px",color:"var(--muted)"}}>
          <p className="serif ital" style={{fontSize:20,color:"var(--ink2)",marginBottom:6}}>No activities yet</p>
          <p style={{fontSize:13}}>Add a camp, practice, or event above</p>
        </div>
      )}

      {/* Cards view */}
      {view==="cards" && upcoming.map(a=>(
        <ActivityCard key={a.id} activity={a} paperwork={paperwork} onDelete={onDelete} onTogglePaperwork={onTogglePaperwork} onDeletePaperwork={onDeletePaperwork} onAddPaperwork={onAddPaperwork} onUpload={onUpload} uploading={uploading}/>
      ))}

      {/* Timeline view */}
      {view==="timeline" && Object.entries(byMonth).map(([month,acts])=>(
        <div key={month} style={{marginBottom:24}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
            <h3 className="serif" style={{fontSize:22,fontWeight:500,color:"var(--ink)"}}>{month}</h3>
            <div style={{flex:1,height:1,background:"var(--line)"}}/>
            <span className="mono" style={{fontSize:11,color:"var(--muted)"}}>{acts.length}</span>
          </div>
          <div style={{position:"relative",paddingLeft:28}}>
            <div style={{position:"absolute",left:9,top:6,bottom:6,width:1.5,background:"var(--line2)"}}/>
            {acts.map(a=>{
              const d=new Date(a.startDate+"T12:00:00");
              return (
                <div key={a.id} style={{position:"relative",marginBottom:10}}>
                  <div style={{position:"absolute",left:-23,top:18,width:11,height:11,borderRadius:"50%",background:"var(--bg)",border:"2.5px solid var(--accent)"}}/>
                  <div style={{position:"absolute",left:-60,top:14,fontSize:11,color:"var(--muted)",textAlign:"right",width:32}}>
                    <div className="mono" style={{fontWeight:700,color:"var(--ink2)",fontSize:13}}>{d.getDate()}</div>
                    <div className="mono" style={{fontSize:9,textTransform:"uppercase",letterSpacing:0.5}}>{d.toLocaleDateString("en-US",{weekday:"short"})}</div>
                  </div>
                  <ActivityCard activity={a} paperwork={paperwork} onDelete={onDelete} onTogglePaperwork={onTogglePaperwork} onDeletePaperwork={onDeletePaperwork} onAddPaperwork={onAddPaperwork} onUpload={onUpload} uploading={uploading}/>
                </div>
              );
            })}
          </div>
        </div>
      ))}

      {/* Calendar view */}
      {view==="calendar" && (
        <div style={{marginBottom:24}}>
          <h3 className="serif" style={{fontSize:22,fontWeight:500,color:"var(--ink)",marginBottom:14}}>{cal.monthLabel}</h3>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6,marginBottom:8}}>
            {["S","M","T","W","T","F","S"].map((d,i)=>(
              <div key={i} className="mono" style={{fontSize:10,fontWeight:700,color:"var(--muted)",textAlign:"center",padding:"4px 0",letterSpacing:0.5}}>{d}</div>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6,marginBottom:24}}>
            {cal.cells.map((c,i)=>(
              <div key={i} style={{aspectRatio:"1/1.1",background:c?"var(--card)":"transparent",border:"1px solid var(--line)",borderRadius:8,padding:"4px 6px",display:"flex",flexDirection:"column",position:"relative",opacity:c?1:0}}>
                {c && (
                  <>
                    <span className="mono" style={{fontSize:11,fontWeight:c.isToday?700:500,color:c.isToday?"var(--accent)":"var(--ink2)"}}>{c.date.getDate()}</span>
                    <div style={{flex:1,display:"flex",flexDirection:"column",gap:2,marginTop:2,overflow:"hidden"}}>
                      {c.acts.slice(0,2).map(a=>(
                        <div key={a.id} title={a.name} style={{fontSize:9,padding:"1px 4px",background:"var(--accent)",color:"white",borderRadius:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.name}</div>
                      ))}
                      {c.acts.length>2 && <div style={{fontSize:9,color:"var(--muted)",fontWeight:600}}>+{c.acts.length-2}</div>}
                    </div>
                  </>
                )}
              </div>
            ))}
          </div>
          <p className="mono" style={{fontSize:11,color:"var(--muted)",marginBottom:10,letterSpacing:0.5,textTransform:"uppercase"}}>Upcoming details</p>
          {upcoming.map(a=><ActivityCard key={a.id} activity={a} paperwork={paperwork} onDelete={onDelete} onTogglePaperwork={onTogglePaperwork} onDeletePaperwork={onDeletePaperwork} onAddPaperwork={onAddPaperwork} onUpload={onUpload} uploading={uploading}/>)}
        </div>
      )}

      {past.length>0 && (
        <div style={{marginTop:20,paddingTop:16,borderTop:"1px solid var(--line)"}}>
          <button onClick={()=>setShowPast(p=>!p)}
            style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"var(--muted)",fontWeight:600,display:"flex",alignItems:"center",gap:6,marginBottom:12}}>
            {showPast?"▲":"▼"} {past.length} past activit{past.length!==1?"ies":"y"}
          </button>
          {showPast && past.map(a=><ActivityCard key={a.id} activity={a} paperwork={paperwork} onDelete={onDelete} onTogglePaperwork={onTogglePaperwork} onDeletePaperwork={onDeletePaperwork} onAddPaperwork={onAddPaperwork} onUpload={onUpload} uploading={uploading}/>)}
        </div>
      )}

      {showAdd && <AddActivityModal onClose={()=>setShowAdd(false)} onSave={data=>{onAdd(data);setShowAdd(false);}}/>}
    </div>
  );
}

// ━━━━━━━━━━━━ Tweaks hook ━━━━━━━━━━━━
function useTweaks(){
  const [t,setT]=US(()=>{
    try{
      const stored=JSON.parse(localStorage.getItem(TWK_KEY)||"null");
      return {...window.TWEAK_DEFAULTS, ...(stored||{})};
    }catch{return window.TWEAK_DEFAULTS;}
  });
  UE(()=>{
    applyTheme(t.theme,t.fontPair,t.dark);
    localStorage.setItem(TWK_KEY,JSON.stringify(t));
    try{window.parent.postMessage({type:"__edit_mode_set_keys",edits:t},"*");}catch{}
  },[t]);
  const setTweak=(k,v)=>setT(p=>({...p,[k]:v}));
  return [t,setTweak];
}

// ━━━━━━━━━━━━ Hook: viewport size ━━━━━━━━━━━━
function useViewport(){
  const [w,setW]=US(typeof window!=="undefined"?window.innerWidth:1024);
  UE(()=>{
    const onR=()=>setW(window.innerWidth);
    window.addEventListener("resize",onR);
    return ()=>window.removeEventListener("resize",onR);
  },[]);
  return {w, isMobile:w<800, isWide:w>=1200};
}

// ━━━━━━━━━━━━ SwipeRow (shopping item) ━━━━━━━━━━━━
function ShoppingItem({item,color,stores,onRemove,onIncrement,onDecrement,onMove,draggingId,onDragStart,onDragEnd,isNew,onTouchMove,isColumnFocused}){
  const [swipeX,setSwipeX]=US(0);
  const [swiping,setSwiping]=US(false);
  const [removing,setRemoving]=US(false);
  const [showMove,setShowMove]=US(false);
  const [movePos,setMovePos]=US({top:0,right:0});
  const sX=UR(0); const dx=UR(0); const startTime=UR(0);
  const longPress=UR(null);
  const moved=UR(false);
  const rowRef=UR(null);

  // Touch: long-press to start drag, otherwise swipe
  const onTS=e=>{
    sX.current=e.touches[0].clientX;
    dx.current=0;
    moved.current=false;
    startTime.current=Date.now();
    longPress.current=setTimeout(()=>{
      if(!moved.current){
        // start drag
        if("vibrate" in navigator) navigator.vibrate(20);
        onDragStart(item.id);
      }
    },380);
  };
  const onTM=e=>{
    const t=e.touches[0];
    const dxNow=t.clientX-sX.current;
    if(Math.abs(dxNow)>4) moved.current=true;
    if(draggingId===item.id){
      e.preventDefault();
      onTouchMove&&onTouchMove(t.clientX,t.clientY);
      return;
    }
    // Only allow swipe-to-delete on the focused/selected column
    if(!isColumnFocused){ dx.current=0; return; }
    if(Math.abs(dxNow)>6 && !swiping) setSwiping(true);
    dx.current=dxNow;
    if(dxNow<0) setSwipeX(Math.max(dxNow,-120));
  };
  const onTE=e=>{
    clearTimeout(longPress.current);
    if(draggingId===item.id){
      onDragEnd(e?.changedTouches?.[0]?.clientX, e?.changedTouches?.[0]?.clientY);
      setSwipeX(0);setSwiping(false);
      return;
    }
    setSwiping(false);
    if(dx.current<-80 && isColumnFocused){
      // Snap to reveal delete zone and ask for confirmation
      setSwipeX(-110);
      setTimeout(()=>{
        if(window.confirm(`Remove "${item.name}"?`)){
          setRemoving(true);
          setTimeout(()=>onRemove(item.id),250);
        } else {
          setSwipeX(0);
        }
      }, 80);
    } else {
      setSwipeX(0);
    }
  };

  const isDragging = draggingId===item.id;

  return (
    <div ref={rowRef} style={{position:"relative",overflow:"visible",marginBottom:6,opacity:removing?0:1,maxHeight:removing?0:80,transition:removing?"all 0.25s ease":"none",animation:isNew?"popIn 0.25s cubic-bezier(0.34,1.56,0.64,1) forwards":"none"}} data-item-id={item.id}>
      <div style={{position:"absolute",right:0,top:0,bottom:0,width:110,background:"linear-gradient(135deg,#e55,#c33)",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",gap:4,zIndex:0}}>
        <span style={{color:"white",fontSize:11,fontWeight:700,letterSpacing:0.5}}>REMOVE</span>
      </div>
      <div draggable onDragStart={e=>{e.dataTransfer.effectAllowed="move";onDragStart(item.id);}} onDragEnd={()=>onDragEnd()}
        onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE}
        style={{position:"relative",zIndex:isDragging?100:1,transform:`translateX(${swipeX}px) ${isDragging?"scale(1.02)":""}`,transition:swiping||isDragging?"none":"transform 0.3s cubic-bezier(0.34,1.56,0.64,1)",opacity:isDragging?0.85:1,boxShadow:isDragging?"0 12px 30px rgba(0,0,0,0.2)":"none",background:"var(--card)",backdropFilter:"blur(8px)",borderRadius:12,padding:"10px 12px",display:"flex",alignItems:"center",gap:8,border:`1px solid ${isDragging?color:"var(--line)"}`,cursor:"grab",userSelect:"none",touchAction:"pan-y"}}>
        <span style={{fontSize:12,color:"var(--muted)",flexShrink:0,fontWeight:700,letterSpacing:-1}}>⠿</span>
        <span style={{fontSize:14,flexShrink:0,color:"var(--ink2)",width:16,textAlign:"center"}}>{item.emoji||itemEmoji(item.name)}</span>
        <span className="serif" style={{flex:1,fontSize:15,color:"var(--ink)",fontWeight:500,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}</span>
        {item._pending && <span style={{width:6,height:6,borderRadius:"50%",background:color,flexShrink:0,animation:"pulse 1s infinite"}}/>}
        <div style={{position:"relative",flexShrink:0}}>
          <button onClick={e=>{e.stopPropagation();const r=e.currentTarget.getBoundingClientRect();setMovePos({top:r.bottom+6,right:window.innerWidth-r.right});setShowMove(p=>!p);}} style={{background:"transparent",border:`1px solid ${color}`,borderRadius:7,padding:"3px 7px",cursor:"pointer",fontSize:10,color:color,fontWeight:700,letterSpacing:0.3}}>MOVE</button>
          {showMove && (
            <div style={{position:"fixed",top:movePos.top,right:movePos.right,background:"var(--card)",backdropFilter:"blur(14px)",borderRadius:10,boxShadow:"0 12px 30px rgba(0,0,0,0.28)",border:"1px solid var(--line2)",zIndex:99999,minWidth:160,overflow:"hidden"}}>
              {stores.filter(s=>s.id!==item.storeId).map(s=>(
                <div key={s.id} onClick={e=>{e.stopPropagation();onMove(item.id,s.id);setShowMove(false);}} style={{padding:"9px 13px",cursor:"pointer",display:"flex",alignItems:"center",gap:8,fontSize:13,color:"var(--ink)",borderBottom:"1px solid var(--line)"}}>
                  <span style={{width:18,height:18,borderRadius:5,background:s.color,color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700}}>{storeIcon(s.name)}</span>
                  <span>{s.name}</span>
                </div>
              ))}
            </div>
          )}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:3,flexShrink:0}}>
          <button onClick={e=>{e.stopPropagation();onDecrement(item.id);}} style={{width:24,height:24,borderRadius:"50%",border:"none",background:"var(--chip)",color:"var(--ink)",fontSize:14,fontWeight:700,cursor:"pointer"}}>−</button>
          <span className="mono" style={{fontWeight:700,fontSize:13,color:"var(--ink)",minWidth:18,textAlign:"center"}}>{item.count}</span>
          <button onClick={e=>{e.stopPropagation();onIncrement(item.id);}} style={{width:24,height:24,borderRadius:"50%",border:"none",background:color,color:"white",fontSize:14,fontWeight:700,cursor:"pointer"}}>+</button>
        </div>
      </div>
    </div>
  );
}

      </div>
      <div style={{flex:1,overflowY:"auto",overflowX:"visible",minHeight:60,paddingRight:2}}>
        {items.length===0 ? (
          <div style={{padding:"22px 14px",borderRadius:12,border:`1.5px dashed ${color}55`,textAlign:"center",color:"var(--muted)",fontSize:12,fontStyle:"italic",fontFamily:"var(--font-display)"}}>
            Drop items here, or add above
          </div>
        ) : items.map(item=>(
          <ShoppingItem key={item.id} item={item} color={color} stores={stores}
            onRemove={onRemoveItem} onIncrement={onIncrement} onDecrement={onDecrement} onMove={onMoveItem}
            draggingId={draggingId} onDragStart={onDragStart} onDragEnd={onDragEnd}

  );
}

// ━━━━━━━━━━━━ Home Dashboard ━━━━━━━━━━━━
function HomeView({stores,items,activities,paperwork,onIncrement,onDecrement,onRemoveItem,onTogglePaperwork,onAddPaperwork,onUpload,uploading,onGoTo}){
  const totalItems=items.length;
  const totalQty=items.reduce((a,b)=>a+Number(b.count),0);
  const sorted=[...activities].sort((a,b)=>new Date(a.startDate)-new Date(b.startDate));
  const upcoming=sorted.filter(a=>isUpcoming(a.endDate||a.startDate)).slice(0,3);

  // Pending paperwork across activities
  const pendingPW = UM(()=>{
    const acts = sorted.filter(a=>isUpcoming(a.endDate||a.startDate));
    const out=[];
    acts.forEach(a=>{
      const pw=paperwork.filter(p=>String(p.activityId)===String(a.id) && !(p.completed===true||p.completed==="TRUE"||p.completed==="true"));
      pw.forEach(p=>out.push({...p, _activity:a, _days:daysUntil(a.startDate)}));
    });
    return out.sort((a,b)=>(a._days??99)-(b._days??99)).slice(0,8);
  },[paperwork,activities]);

  // Group items by store, sorted by store with most
  const itemsByStore = UM(()=>{
    return stores.map(s=>({store:s,items:items.filter(i=>i.storeId===s.id)})).filter(g=>g.items.length>0);
  },[stores,items]);

  const greeting = (()=>{
    const h=new Date().getHours();
    if(h<5) return "Late night";
    if(h<12) return "Good morning";
    if(h<17) return "Good afternoon";
    if(h<21) return "Good evening";
    return "Good night";
  })();

  const today = new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});

  return (
    <div style={{padding:"0 0 60px"}}>
      {/* Hero greeting */}
      <div style={{marginBottom:32,paddingBottom:24,borderBottom:"1px solid var(--line)"}}>

        </h1>
        <p className="serif ital" style={{fontSize:"clamp(16px, 2vw, 19px)",color:"var(--ink2)",marginTop:8,lineHeight:1.5}}>
          {totalItems===0 && upcoming.length===0 ? "All quiet on the home front." :
           totalItems>0 && pendingPW.length>0 ? `${totalQty} things to grab, ${pendingPW.length} forms still pending.` :
           totalItems>0 ? `${totalQty} ${totalQty===1?"thing":"things"} to grab across ${itemsByStore.length} ${itemsByStore.length===1?"store":"stores"}.` :
           pendingPW.length>0 ? `${pendingPW.length} ${pendingPW.length===1?"form":"forms"} still need attention.` :
           upcoming.length>0 ? `${upcoming.length} upcoming activit${upcoming.length===1?"y":"ies"}.` : ""}

                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>

              </div>
