          )}
        </section>
      </div>
    </div>
  );
}

// ━━━━━━━━━━━━ Shopping (Kanban) ━━━━━━━━━━━━
function ShoppingTab({stores,items,history,selectedStoreId,setSelectedStoreId,onAddItem,onRemoveItem,onIncrement,onDecrement,onMoveItem,onAddStore,onDeleteStore,draggingId,onDragStart,onDragEnd,onDrop,newItemIds,isMobile}){
  const [itemInput,setItemInput]=US("");
  const [storeInput,setStoreInput]=US("");
  const [showAddStore,setShowAddStore]=US(false);
  const [showItemSugs,setShowItemSugs]=US(false);
  const [storeSugs,setStoreSugs]=US([]);
  const [activeDropZone,setActiveDropZone]=US(null);
  const storeInputRef=UR(null);
  const kanbanRef=UR(null);

  const itemSugs = UM(()=>{
    if(!itemInput.trim())return [];
    const q=itemInput.toLowerCase();
    return history.filter(h=>h.toLowerCase().startsWith(q)&&h.toLowerCase()!==q).slice(0,5);
  },[itemInput,history]);

  UE(()=>{
    if(!storeInput.trim()){setStoreSugs([]);return;}
    const q=storeInput.toLowerCase();
    setStoreSugs(COMMON_STORES.filter(s=>s.toLowerCase().includes(q)&&!stores.find(st=>st.name.toLowerCase()===s.toLowerCase())).slice(0,6));
  },[storeInput,stores]);

  // Touch drag: track finger and detect drop zone
  const onTouchMove=(x,y)=>{
    const el=document.elementFromPoint(x,y);
    if(!el){setActiveDropZone(null);return;}
    const col=el.closest("[data-store-id]");
    if(col) setActiveDropZone(col.getAttribute("data-store-id"));
    else setActiveDropZone(null);
  };

  const onDragEndWrapper=(x,y)=>{
    if(x!==undefined && y!==undefined){
      const el=document.elementFromPoint(x,y);
      const col=el?.closest("[data-store-id]");
      if(col && draggingId){
        const targetId=col.getAttribute("data-store-id");
        onDrop(targetId);
      }
    }
    setActiveDropZone(null);
    onDragEnd();
  };

  const handleAdd = ()=>{
    if(!itemInput.trim()||!selectedStoreId)return;
    onAddItem(itemInput);
    setItemInput("");setShowItemSugs(false);
  };

  const handleAddSuggestion = (name)=>{
    onAddItem(name);
    setItemInput("");setShowItemSugs(false);
  };

  const handleAddStore = (name)=>{
    if(!name.trim())return;
    onAddStore(name);
    setStoreInput("");setStoreSugs([]);setShowAddStore(false);
  };

  const selectedStore = stores.find(s=>s.id===selectedStoreId);

  return (
    <div style={{padding:"0 0 60px"}}>
      {/* Add bar */}
      {stores.length>0 && (
        <div style={{position:"relative",marginBottom:18,zIndex:50}}>
          <div style={{background:"var(--card)",backdropFilter:"blur(12px)",borderRadius:16,padding:"12px 14px",border:"1.5px solid var(--line2)",boxShadow:"0 4px 20px var(--glow)"}}>
            {/* Store pills */}
            <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
              <p className="mono" style={{fontSize:10,color:"var(--muted)",letterSpacing:0.8,textTransform:"uppercase",fontWeight:600,marginRight:4}}>Add to:</p>
              {stores.map(s=>(
                <button key={s.id} onClick={()=>setSelectedStoreId(s.id)} style={{
                  padding:"4px 11px",borderRadius:18,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,
                  background:selectedStoreId===s.id?s.color:"var(--chip)",
                  color:selectedStoreId===s.id?"white":"var(--ink2)",
                  display:"inline-flex",alignItems:"center",gap:5
                }}>
                  <span style={{fontSize:10,fontWeight:700}}>{storeIcon(s.name)}</span>
                  {s.name}
                </button>
              ))}
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <input value={itemInput} onChange={e=>{setItemInput(e.target.value);setShowItemSugs(true);}}
                onKeyDown={e=>{if(e.key==="Enter")handleAdd();if(e.key==="Escape")setShowItemSugs(false);}}
                onFocus={()=>setShowItemSugs(true)}
                onBlur={()=>setTimeout(()=>setShowItemSugs(false),180)}
                placeholder={selectedStoreId?`Add to ${selectedStore?.name||""}…`:"Select a store first"}
                disabled={!selectedStoreId}
                style={{flex:1,border:"none",outline:"none",background:"transparent",fontSize:15,padding:"6px 0",color:"var(--ink)"}}/>
              <button onClick={handleAdd} disabled={!selectedStoreId||!itemInput.trim()}
                style={{background:selectedStore?selectedStore.color:"var(--muted)",color:"white",border:"none",borderRadius:11,padding:"9px 18px",fontSize:14,fontWeight:700,cursor:selectedStoreId?"pointer":"not-allowed",letterSpacing:0.2}}>Add</button>
            </div>
          </div>
          {/* Suggestions — high z-index, rendered absolute below */}
          {showItemSugs && itemSugs.length>0 && (
            <div style={{position:"absolute",left:0,right:0,top:"calc(100% + 4px)",background:"var(--card)",backdropFilter:"blur(20px)",borderRadius:14,boxShadow:"0 12px 40px rgba(0,0,0,0.18)",border:"1px solid var(--line2)",overflow:"hidden",zIndex:9999}}>
              {itemSugs.map((s,i)=>(
                <div key={i} onMouseDown={e=>{e.preventDefault();handleAddSuggestion(s);}} style={{padding:"11px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,fontSize:14,color:"var(--ink)",borderBottom:i<itemSugs.length-1?"1px solid var(--line)":"none"}}
                  onMouseEnter={e=>e.currentTarget.style.background="var(--chip)"}
                  onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <span style={{color:"var(--muted)",width:14,textAlign:"center",fontSize:12}}>{itemEmoji(s)}</span>
                  <span className="serif" style={{flex:1,fontWeight:500}}>{s}</span>
                  <span className="mono" style={{fontSize:10,color:"var(--muted)"}}>↩ add</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* Empty state */}
      {stores.length===0 && (
        <div style={{textAlign:"center",padding:"60px 20px",color:"var(--muted)"}}>
          <p className="serif ital" style={{fontSize:22,color:"var(--ink2)",marginBottom:8}}>No stores yet</p>
          <p style={{fontSize:13,marginBottom:16}}>Add your first store below</p>
        </div>
      )}

      {/* Kanban — horizontal scroll */}
      {stores.length>0 && (
        <div ref={kanbanRef} className="kanban-scroll" style={{
          display:"flex",gap:14,overflowX:"auto",overflowY:"visible",
          paddingBottom:14,scrollSnapType:"x mandatory",
          marginLeft:"calc(-1 * var(--page-pad, 20px))",marginRight:"calc(-1 * var(--page-pad, 20px))",
          paddingLeft:"var(--page-pad, 20px)",paddingRight:"var(--page-pad, 20px)",
        }}>
          {stores.map(store=>(
            <StoreColumn key={store.id} store={store} color={store.color}
              items={items.filter(i=>i.storeId===store.id)} stores={stores}
              selected={selectedStoreId===store.id}
              onSelect={setSelectedStoreId}
              onRemoveItem={onRemoveItem} onIncrement={onIncrement} onDecrement={onDecrement} onMoveItem={onMoveItem} onDeleteStore={onDeleteStore}
              draggingId={draggingId} onDragStart={onDragStart} onDragEnd={onDragEndWrapper}
              onDrop={onDrop} newItemIds={newItemIds} onTouchMove={onTouchMove}
              activeDropZone={activeDropZone}/>
          ))}

          {/* Add store column */}
          <div style={{flex:"0 0 220px",scrollSnapAlign:"start",display:"flex",alignItems:"flex-start",paddingTop:8}}>
            {!showAddStore ? (
              <button onClick={()=>{setShowAddStore(true);setTimeout(()=>storeInputRef.current?.focus(),50);}}
                style={{width:"100%",padding:"24px 18px",borderRadius:16,border:"1.5px dashed var(--line2)",background:"transparent",cursor:"pointer",fontSize:13,color:"var(--ink2)",fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                <span style={{fontSize:18}}>+</span> Add store
              </button>
            ) : (
              <div style={{position:"relative",width:"100%"}}>
                <div style={{background:"var(--card)",borderRadius:14,padding:"12px 14px",border:"1.5px solid var(--accent)",display:"flex",gap:6,alignItems:"center"}}>
                  <input ref={storeInputRef} value={storeInput} onChange={e=>setStoreInput(e.target.value)}
                    onKeyDown={e=>{if(e.key==="Enter")handleAddStore(storeInput);if(e.key==="Escape"){setShowAddStore(false);setStoreInput("");}}}
                    placeholder="Store name…" style={{flex:1,border:"none",outline:"none",background:"transparent",fontSize:14,color:"var(--ink)"}}/>
                  <button onClick={()=>handleAddStore(storeInput)} style={{background:"var(--accent)",color:"white",border:"none",borderRadius:8,padding:"5px 11px",fontSize:12,fontWeight:700,cursor:"pointer"}}>Add</button>
                  <button onClick={()=>{setShowAddStore(false);setStoreInput("");}} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:"var(--muted)"}}>✕</button>
                </div>
                {storeSugs.length>0 && (
                  <div style={{position:"absolute",left:0,right:0,top:"calc(100% + 4px)",background:"var(--card)",backdropFilter:"blur(14px)",borderRadius:12,boxShadow:"0 12px 30px rgba(0,0,0,0.18)",border:"1px solid var(--line2)",overflow:"hidden",zIndex:200}}>
                    {storeSugs.map((s,i)=>(
                      <div key={i} onMouseDown={e=>{e.preventDefault();handleAddStore(s);}}
                        style={{padding:"9px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:8,fontSize:13,color:"var(--ink)",borderBottom:i<storeSugs.length-1?"1px solid var(--line)":"none"}}
                        onMouseEnter={e=>e.currentTarget.style.background="var(--chip)"}
                        onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                        <span style={{width:18,height:18,borderRadius:5,background:"var(--chip)",color:"var(--ink2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700}}>{storeIcon(s)}</span>
                        <span>{s}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      )}

      {/* Mobile hint */}
      {isMobile && stores.length>1 && (
        <p className="mono" style={{textAlign:"center",fontSize:10,color:"var(--muted)",marginTop:8,letterSpacing:0.5}}>↔ swipe between stores · ⠿ long-press to drag</p>
      )}
    </div>
  );
}

// ━━━━━━━━━━━━ App ━━━━━━━━━━━━
function App(){
  const [tweaks,setTweak] = useTweaks();
  const {w, isMobile, isWide} = useViewport();

  const [config,setConfig]           = US(null);
  const [stores,setStores]           = US([]);
  const [items,setItems]             = US([]);
  const [history,setHistory]         = US([]);
  const [activities,setActivities]   = US([]);
  const [paperwork,setPaperwork]     = US([]);
  const [loading,setLoading]         = US(true);
  const [bgLabel,setBgLabel]         = US("");
  const [apiError,setApiError]       = US("");
  const [lastSync,setLastSync]       = US(null);
  const [activeTab,setActiveTab]     = US("home");
  const [showHistory,setShowHistory] = US(false);
  const [showTweaks,setShowTweaks]   = US(false);
  const [uploading,setUploading]     = US(false);
  const [newItemIds,setNewItemIds]   = US(new Set());
  const [selectedStoreId,setSelectedStoreId] = US(null);
  const [draggingId,setDraggingId]   = US(null);
  const configRef=UR(null);

  UE(()=>{const cfg=loadConfig();if(cfg.scriptUrl&&cfg.password){configRef.current=cfg;setConfig(cfg);}else setLoading(false);},[]);

  const applyData=UCB((data)=>{
    if(data.stores!==undefined) setStores(data.stores.map((s,i)=>({...s,color:s.color||STORE_COLORS[i%STORE_COLORS.length]})));
    if(data.items!==undefined) setItems(data.items);
    if(data.history!==undefined) setHistory(data.history);
    if(data.activities!==undefined) setActivities(data.activities);
    if(data.paperwork!==undefined) setPaperwork(data.paperwork);
    saveCache(data); setLastSync(new Date()); setApiError("");
  },[]);

  const fetchAll=UCB(async(cfg,hasCached=false)=>{
    cfg=cfg||configRef.current; if(!cfg)return;
    setBgLabel("Syncing…");
    try{const data=await api(cfg.scriptUrl,cfg.password,"getAll");applyData(data);setApiError("");}
    catch(e){if(hasCached){setTimeout(async()=>{try{const data=await api(cfg.scriptUrl,cfg.password,"getAll");applyData(data);setApiError("");}catch(_){}},3000);}else setApiError(e.message);}
    finally{setBgLabel("");}
  },[applyData]);

  UE(()=>{if(!config)return;configRef.current=config;const cached=loadCache();if(cached){applyData(cached);setLoading(false);fetchAll(config,true);}else{setLoading(true);fetchAll(config,false).finally(()=>setLoading(false));}},[config]);
  UE(()=>{if(!config)return;const t=setInterval(()=>fetchAll(null,true),12000);return ()=>clearInterval(t);},[config,fetchAll]);
  UE(()=>{if(stores.length>0&&(!selectedStoreId||!stores.find(s=>s.id===selectedStoreId)))setSelectedStoreId(stores[0].id);if(stores.length===0)setSelectedStoreId(null);},[stores]);

  // Listen for tweaks toolbar messages
  UE(()=>{
    const handler=(e)=>{
      if(e.data?.type==="__activate_edit_mode") setShowTweaks(true);
      if(e.data?.type==="__deactivate_edit_mode") setShowTweaks(false);
    };
    window.addEventListener("message",handler);
    try{window.parent.postMessage({type:"__edit_mode_available"},"*");}catch{}
    return ()=>window.removeEventListener("message",handler);
  },[]);

  const bgAct=UCB(async(action,extra)=>{
    const cfg=configRef.current;if(!cfg)return;
    setBgLabel("Saving…");
    try{const data=await api(cfg.scriptUrl,cfg.password,action,extra);applyData(data);if(data._calendarError)setApiError("Saved, calendar error: "+data._calendarError);}
    catch(e){setApiError(e.message);}
    finally{setBgLabel("");}
  },[applyData]);

  // Shopping
  const addStore=UCB(async(name)=>{
    const t=name.trim();if(!t||stores.find(s=>s.name.toLowerCase()===t.toLowerCase()))return;
    const ns={id:uid(),name:t,color:STORE_COLORS[stores.length%STORE_COLORS.length]};
    setStores(p=>[...p,ns]);setSelectedStoreId(ns.id);
    await bgAct("addStore",ns);
  },[stores,bgAct]);
  const deleteStore=UCB(async(id)=>{
    if(!confirm("Remove this store? Items will be deleted too."))return;
    setStores(p=>p.filter(s=>s.id!==id));setItems(p=>p.filter(i=>i.storeId!==id));
    await bgAct("removeStore",{id});
  },[bgAct]);
  const addItem=UCB(async(name)=>{
    const t=name.trim();if(!t||!selectedStoreId)return;
    const existing=items.find(i=>i.name.toLowerCase()===t.toLowerCase()&&i.storeId===selectedStoreId);
    if(existing){
      setItems(p=>p.map(i=>i.id===existing.id?{...i,count:Number(i.count)+1}:i));
      await bgAct("updateItem",{id:existing.id,updates:{count:Number(existing.count)+1}});
    }else{
      const ni={id:uid(),name:t,count:1,emoji:itemEmoji(t),storeId:selectedStoreId,addedAt:Date.now(),_pending:true};
      setItems(p=>[...p,ni]);
      setNewItemIds(s=>new Set([...s,ni.id]));
      setTimeout(()=>setNewItemIds(s=>{const n=new Set(s);n.delete(ni.id);return n;}),1500);
      setHistory(p=>[t,...p.filter(h=>h.toLowerCase()!==t.toLowerCase())].slice(0,80));
      await bgAct("addItem",{...ni,_pending:undefined});
    }
  },[items,selectedStoreId,bgAct]);
  const removeItem=UCB(async id=>{setItems(p=>p.filter(i=>i.id!==id));await bgAct("removeItem",{id});},[bgAct]);
  const increment=UCB(async id=>{setItems(p=>p.map(i=>i.id===id?{...i,count:Number(i.count)+1}:i));const it=items.find(i=>i.id===id);if(it)await bgAct("updateItem",{id,updates:{count:Number(it.count)+1}});},[items,bgAct]);
  const decrement=UCB(async id=>{const it=items.find(i=>i.id===id);if(!it||Number(it.count)<=1)return;setItems(p=>p.map(i=>i.id===id?{...i,count:Number(i.count)-1}:i));await bgAct("updateItem",{id,updates:{count:Number(it.count)-1}});},[items,bgAct]);
  const moveItem=UCB(async(id,storeId)=>{setItems(p=>p.map(i=>i.id===id?{...i,storeId}:i));await bgAct("moveItem",{id,storeId});},[bgAct]);
  const removeHistEntry=UCB(async name=>{setHistory(p=>p.filter(h=>h!==name));await bgAct("removeHistory",{name});},[bgAct]);
  const clearHistAll=UCB(async()=>{setHistory([]);setShowHistory(false);await bgAct("clearHistory");},[bgAct]);
  // Activities
  const addActivity=UCB(async(data)=>{const calendarId=configRef.current?.calendarId||"";await bgAct("addActivity",{...data,calendarId});},[bgAct]);
  const deleteActivity=UCB(async(id)=>{const calendarId=configRef.current?.calendarId||"";setActivities(p=>p.filter(a=>a.id!==id));setPaperwork(p=>p.filter(pw=>String(pw.activityId)!==String(id)));await bgAct("removeActivity",{id,calendarId});},[bgAct]);
  const addPaperwork=UCB(async(data)=>{setPaperwork(p=>[...p,{...data,completed:false}]);await bgAct("addPaperwork",data);},[bgAct]);
  const togglePaperwork=UCB(async(id,completed)=>{setPaperwork(p=>p.map(pw=>pw.id===id?{...pw,completed}:pw));await bgAct("updatePaperwork",{id,updates:{completed}});},[bgAct]);
  const deletePaperwork=UCB(async(id)=>{setPaperwork(p=>p.filter(pw=>pw.id!==id));await bgAct("removePaperwork",{id});},[bgAct]);
  const uploadFile=UCB(async(file,label,activityId)=>{
    setUploading(true);
    try{
      const cfg=configRef.current;if(!cfg)return null;
      const reader=new FileReader();
      const b64=await new Promise((res,rej)=>{reader.onload=e=>res(e.target.result.split(",")[1]);reader.onerror=rej;reader.readAsDataURL(file);});
      const result=await api(cfg.scriptUrl,cfg.password,"uploadFile",{fileData:b64,mimeType:file.type,fileName:file.name});
      if(result.error){alert("Upload failed: "+result.error);return null;}
      return result.url;
    }catch(e){alert("Upload failed: "+e.message);return null;}
    finally{setUploading(false);}
  },[]);

  const onDrop=UCB((targetStoreId)=>{
    if(draggingId && targetStoreId){
      const it=items.find(i=>i.id===draggingId);
      if(it && it.storeId!==targetStoreId) moveItem(draggingId,targetStoreId);
    }
    setDraggingId(null);
  },[draggingId,items,moveItem]);

  const syncTime=lastSync?lastSync.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"—";

  if(!config) return <SetupScreen onComplete={cfg=>{setConfig(cfg);setLoading(true);}}/>;
  if(loading) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{width:32,height:32,border:"2.5px solid var(--line2)",borderTopColor:"var(--accent)",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      <p className="serif ital" style={{fontSize:16,color:"var(--ink2)"}}>Loading…</p>
    </div>
  );

  // Layout decision
  const useSidebar = (tweaks.layout==="sidebar") || (tweaks.layout==="auto" && isWide);
  const tabs=[["home","Home","◐"],["shopping","Shopping","☐"],["activities","Activities","◇"]];

  const pagePadStyle = isMobile ? {"--page-pad":"16px"} : {"--page-pad":"28px"};

  // Sticky header content
  const Header = (
    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12}}>
      <div>
        <p className="serif ital" style={{fontSize:13,color:"var(--accent)",marginBottom:0}}>our</p>
        <h1 className="serif" style={{fontSize:isMobile?26:34,fontWeight:500,color:"var(--ink)",lineHeight:1,letterSpacing:-0.6}}>Family.</h1>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <div style={{background:"var(--chip)",borderRadius:18,padding:"5px 10px",display:"inline-flex",alignItems:"center",gap:6}}>
          {bgLabel ? (
            <div style={{width:8,height:8,border:"1.5px solid var(--accent)",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.6s linear infinite"}}/>
          ) : (
            <div style={{width:6,height:6,borderRadius:"50%",background:"var(--accent)",animation:"pulse 2.5s infinite"}}/>
          )}
          <span className="mono" style={{fontSize:10,color:"var(--accent)",fontWeight:700,letterSpacing:0.4}}>{bgLabel||"Synced"}</span>
        </div>
        <button onClick={()=>setShowTweaks(p=>!p)} title="Tweaks" style={{width:34,height:34,borderRadius:"50%",border:"1px solid var(--line2)",background:"var(--card)",cursor:"pointer",fontSize:14,color:"var(--ink2)"}}>⚙</button>
      </div>
    </div>
  );

  const TabBar = ({orientation="horizontal"})=>(
    <div style={{
      display:"flex",
      flexDirection:orientation==="vertical"?"column":"row",
      gap:orientation==="vertical"?4:4,
      background:orientation==="vertical"?"transparent":"var(--card)",
      border:orientation==="vertical"?"none":"1px solid var(--line)",
      borderRadius:14,padding:orientation==="vertical"?0:4,
      marginBottom:orientation==="vertical"?0:18
    }}>
      {tabs.map(([id,label,glyph])=>(
        <button key={id} onClick={()=>setActiveTab(id)}
          style={{
            flex:orientation==="vertical"?"none":1,
            padding:orientation==="vertical"?"12px 14px":"10px",
            borderRadius:orientation==="vertical"?12:10,
            border:"none",cursor:"pointer",fontFamily:"var(--font-body)",fontSize:13.5,fontWeight:600,
            transition:"all 0.15s",
            background:activeTab===id?(orientation==="vertical"?"var(--accent)":"var(--bg)"):"transparent",
            color:activeTab===id?(orientation==="vertical"?"white":"var(--ink)"):"var(--ink2)",
            boxShadow:activeTab===id&&orientation!=="vertical"?"0 2px 8px var(--glow)":"none",
            display:"flex",alignItems:"center",gap:9,justifyContent:orientation==="vertical"?"flex-start":"center",
            textAlign:"left",
          }}>
          <span style={{fontSize:14,opacity:0.85}}>{glyph}</span>
          <span>{label}</span>
        </button>
      ))}
    </div>
  );

  const TabBody = (
    <>
      {activeTab==="home" && (
        <HomeView stores={stores} items={items} activities={activities} paperwork={paperwork}
          onIncrement={increment} onDecrement={decrement} onRemoveItem={removeItem}
          onTogglePaperwork={togglePaperwork} onAddPaperwork={addPaperwork} onUpload={uploadFile} uploading={uploading}
          onGoTo={setActiveTab}/>
      )}
      {activeTab==="shopping" && (
        <ShoppingTab stores={stores} items={items} history={history}
          selectedStoreId={selectedStoreId} setSelectedStoreId={setSelectedStoreId}
          onAddItem={addItem} onRemoveItem={removeItem} onIncrement={increment} onDecrement={decrement} onMoveItem={moveItem}
          onAddStore={addStore} onDeleteStore={deleteStore}
          draggingId={draggingId} onDragStart={setDraggingId} onDragEnd={()=>setDraggingId(null)} onDrop={onDrop}
          newItemIds={newItemIds} isMobile={isMobile}/>
      )}
      {activeTab==="activities" && (
        <ActivitiesTab activities={activities} paperwork={paperwork} view={tweaks.activitiesView}
          onAdd={addActivity} onDelete={deleteActivity}
          onTogglePaperwork={togglePaperwork} onDeletePaperwork={deletePaperwork}
          onAddPaperwork={addPaperwork} onUpload={uploadFile} uploading={uploading}/>
      )}
    </>
  );

  return (
    <>
      {showHistory && <HistoryModal history={history} onRemove={removeHistEntry} onClearAll={clearHistAll} onClose={()=>setShowHistory(false)}/>}
      {showTweaks && <TweaksPanel tweaks={tweaks} setTweak={setTweak} onClose={()=>{setShowTweaks(false);try{window.parent.postMessage({type:"__edit_mode_dismissed"},"*");}catch{}}}/>}

      <div style={{minHeight:"100vh",...pagePadStyle}}>
        {useSidebar ? (
          // ─── SIDEBAR LAYOUT (desktop) ───
          <div style={{display:"grid",gridTemplateColumns:"240px 1fr",gap:0,minHeight:"100vh"}}>
            <aside style={{padding:"32px 20px",borderRight:"1px solid var(--line)",position:"sticky",top:0,height:"100vh",display:"flex",flexDirection:"column",gap:24}}>
              <div>
                <p className="serif ital" style={{fontSize:13,color:"var(--accent)",marginBottom:2}}>our</p>
                <h1 className="serif" style={{fontSize:30,fontWeight:500,color:"var(--ink)",lineHeight:1,letterSpacing:-0.6}}>Family.</h1>
              </div>
              <TabBar orientation="vertical"/>
              <div style={{marginTop:"auto",display:"flex",flexDirection:"column",gap:8}}>
                {activeTab==="shopping" && <button onClick={()=>setShowHistory(true)} style={{background:"var(--card)",border:"1px solid var(--line2)",borderRadius:10,padding:"7px 12px",cursor:"pointer",fontSize:12,color:"var(--ink2)",fontWeight:600}}>History</button>}
                <button onClick={()=>setShowTweaks(p=>!p)} style={{background:"var(--card)",border:"1px solid var(--line2)",borderRadius:10,padding:"7px 12px",cursor:"pointer",fontSize:12,color:"var(--ink2)",fontWeight:600}}>⚙ Tweaks</button>
                <div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 10px"}}>
                  {bgLabel ? (
                    <div style={{width:7,height:7,border:"1.3px solid var(--accent)",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.6s linear infinite"}}/>
                  ) : (
                    <div style={{width:6,height:6,borderRadius:"50%",background:"var(--accent)",animation:"pulse 2.5s infinite"}}/>
                  )}
                  <span className="mono" style={{fontSize:10,color:"var(--muted)",letterSpacing:0.4}}>{bgLabel||`Synced ${syncTime}`}</span>
                </div>
                <p className="mono" style={{fontSize:9,color:"var(--muted)",cursor:"pointer",textDecoration:"underline"}} onClick={()=>{if(confirm("Disconnect?")){localStorage.removeItem(CFG_KEY);setConfig(null);setLoading(false);}}}>Change connection</p>
              </div>
            </aside>
            <main style={{padding:"36px 36px",maxWidth:1100,width:"100%"}}>
              {apiError && <p style={{fontSize:12,color:"#c05050",background:"rgba(200,80,80,0.08)",padding:"8px 14px",borderRadius:10,marginBottom:14}}>⚠ {apiError}</p>}
              {TabBody}
            </main>
          </div>
        ) : (
          // ─── TABS LAYOUT (mobile / narrow) ───
          <div style={{maxWidth:760,margin:"0 auto",padding:`24px var(--page-pad,16px) 80px`}}>
            {Header}
            {apiError && <p style={{fontSize:12,color:"#c05050",background:"rgba(200,80,80,0.08)",padding:"7px 12px",borderRadius:9,margin:"12px 0"}}>⚠ {apiError}</p>}
            <div style={{marginTop:18}}>
              <TabBar/>
              {activeTab==="shopping" && (
                <div style={{display:"flex",justifyContent:"flex-end",marginBottom:8}}>
                  <button onClick={()=>setShowHistory(true)} style={{background:"var(--card)",border:"1px solid var(--line2)",borderRadius:9,padding:"4px 10px",cursor:"pointer",fontSize:11,color:"var(--ink2)",fontWeight:600}}>History</button>
                </div>
              )}
              {TabBody}
            </div>
            <p className="mono" style={{textAlign:"center",marginTop:24,fontSize:10,color:"var(--muted)",letterSpacing:0.5}}>
              <span style={{cursor:"pointer",textDecoration:"underline"}} onClick={()=>{if(confirm("Disconnect?")){localStorage.removeItem(CFG_KEY);setConfig(null);setLoading(false);}}}>change connection</span>
            </p>
          </div>
        )}
      </div>
    </>
  );
}



ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
